name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  calidad-y-seguridad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (codigo redundante / muerto / buggy)
        run: ruff check .
      - name: Vulture (dead code)
        run: vulture
      - name: Mypy (tipos)
        run: mypy
      - name: Bandit (auditoria de seguridad - SAST)
        run: bandit -c pyproject.toml -r app anonimal_lite -q
      - name: pip-audit (vulnerabilidades en dependencias)
        run: pip-audit -r requirements.txt
      - name: detect-secrets (no filtrar secretos)
        run: detect-secrets-hook --baseline .secrets.baseline $(git ls-files)

      - name: Tests + cobertura (umbral en pyproject.toml)
        run: |
          coverage run -m pytest -q tests/test_engine.py tests/test_api.py \
            tests/test_api_coverage.py tests/test_privacy.py tests/test_rules.py tests/test_pdf.py
          coverage report

      - name: Trivy (vulns + secrets de las dependencias del repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  imagen-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen lite
        run: docker build -f Dockerfile.lite -t anonimal:lite .

      - name: Smoke del contenedor (arranca + /health + /anonymize)
        run: |
          docker run -d --name anonimal_smoke -p 8920:8000 anonimal:lite
          pip install httpx
          SMOKE_URL=http://127.0.0.1:8920 python scripts/smoke.py
          docker rm -f anonimal_smoke

      - name: Trivy (scan de la imagen lite, informativo en PR)
        # Informativo en PR (la rotacion de CVEs del base image no debe romper
        # PRs). El gate bloqueante esta en release.yml antes de publicar.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: anonimal:lite
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

  # NOTA: la imagen full (ML, ~6-7 GB con torch/transformers/OPF) no se buildea en
  # cada PR por costo. Escanearla con Trivy es un paso aparte/programado antes de
  # publicarla:  docker build -t anonimal:full .  &&  trivy image anonimal:full
