<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnonOptions · demo</title>
<style>
  /* Tokens del ecosistema (acá: acento índigo de Anonimal). Cada app trae los suyos. */
  :root {
    --bg: #f7f7fb; --bg-2: #ffffff; --text: #15161f; --muted: #6c6f80;
    --muted-2: #3a3c49; --border: rgba(18,20,40,.12); --accent: #4a4e7c;
    --on-accent: #ffffff; --radius: 10px;
  }
  [data-theme="dark"] {
    --bg: #0c0d14; --bg-2: #161824; --text: #edeef4; --muted: #8b8fa3;
    --muted-2: #c2c5d6; --border: rgba(255,255,255,.14); --accent: #9aa0db;
    --on-accent: #13141f;
  }
  body { font-family: "Inter Variable","Inter",system-ui,sans-serif; background: var(--bg);
    color: var(--text); margin: 0; padding: 32px clamp(16px,5vw,48px); }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; }
  .panel { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px;
    padding: 20px; margin-top: 16px; }
  /* Estilos de formulario "del host": el componente los HEREDA (continuista). */
  select, input, textarea { width: 100%; font: inherit; font-size: 14px; color: var(--text);
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 11px; box-sizing: border-box; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .row label { font-size: 13px; color: var(--muted-2); }
  .row select { width: auto; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; font-size: 12px; overflow: auto; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AnonOptions — demo del componente compartido</h1>

  <div class="row">
    <label>Idioma <select id="lang">
      <option value="es">ES</option><option value="en">EN</option>
      <option value="fr">FR</option><option value="pt">PT</option>
      <option value="it">IT</option><option value="zh">中文</option><option value="ja">日本語</option>
    </select></label>
    <label><input type="checkbox" id="svc" style="width:auto" checked /> hasService (motor completo)</label>
    <label><input type="checkbox" id="dark" style="width:auto" /> oscuro</label>
  </div>

  <div class="panel" id="host"></div>

  <h1 style="font-size:14px;margin-top:24px">getValues() en vivo</h1>
  <pre id="out">—</pre>
</div>

<script src="/anonimal_lite/ui/anon-options.js"></script>
<script src="/examples/demo.js"></script>
</body>
</html>
